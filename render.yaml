services:
  - type: web
    name: campusserve-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && python manage.py seed_data && python manage.py collectstatic --noinput && gunicorn campusserve.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: SECRET_KEY
        value: campusserve-prod-2026-miva-mit8333-xK9pL2mN8qR
      - key: DEBUG
        value: "False"
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""
      - key: CORS_ALLOWED_ORIGINS
        value: https://placeholder.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: campusserve-db
          property: connectionString

databases:
  - name: campusserve-db
    plan: free
